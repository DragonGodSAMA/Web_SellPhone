<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon God Phone Registration</title>
    <style>
        * {
            list-style-type:none;
            padding: 0;
            margin: 0;
        }
        body {
            background-color: rgb(227, 227, 227);
        }
        .basic_contaner {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 80px auto 130px;
            grid-template-areas: 
                "header"
                "main"
                "footer";
        }
        .Header {
            grid-area: header;
            display:flex;
            align-items: center;
            height:100%;
            width:100%;
        }
        .Registration_container{
            grid-area: main;
            background-color: rgb(255, 255, 255);
        }
        .footer-Serve {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .footer-Serve a {
            display: inline-block;
            margin: 30px 15px 0 15px;
            font-size: 15px;
            text-align: center;
            color: rgb(99, 99, 99);
            text-decoration: none;
        }
        .footer-Serve a:hover {
            text-decoration: underline;
        }
        .Back-btn {
            padding: 8px 20px;
            margin-left: auto;
            margin-right: 80px;
            border: 1px solid rgb(184, 122, 122);
            border-radius: 4px;
            color: rgb(184, 122, 122);
            text-decoration: none;
            font-size: 14px;
        }

        .Back-btn:hover {
            background-color: rgb(184, 122, 122);
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <div class="basic_contaner">
        <div class="Header" >
            <h2 style="color: rgb(71, 71, 71); margin: 20px 20px 0 50px;">DragonGod Phone</h2>
            <a class="Back-btn" href="#" style="margin-top: 20px;">Back</a>
        </div>
        <div class="Registration_container">   
            
        </div>
        <div>
        <div class="footer-Serve">
            <a href="#">Terms of Service</a>
            <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
            <a href="#">Privacy Policy</a>
            <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
            <a href="#">Contact Us</a>
        </div>
        <p style="color: rgb(120, 120, 120); text-align: center; margin: 20px 0;">© 2026 DragonGod Phone. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
